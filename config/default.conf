# Zapret-Pi Configuration
# https://github.com/user/zapret-pi

MODE=nfqws
MODE_FILTER=none
IFACE_WAN=eth0
TPWS_ENABLE=0
NFQWS_ENABLE=1
NFQWS_PORTS_TCP="80,443"
NFQWS_PORTS_UDP="443"
NFQWS_QUEUE_NUM=200

# Default strategy: fake + fakedsplit with md5sig fooling
NFQWS_OPT="
--filter-tcp=80,443 --dpi-desync=fake,fakedsplit --dpi-desync-fooling=md5sig \
--dpi-desync-split-pos=1,midsld --dpi-desync-split-seqovl=2 \
--dpi-desync-fake-tls-mod=rnd,rndsni,dupsid \
--dpi-desync-any-protocol \
--new \
--filter-udp=443 --dpi-desync=fake --dpi-desync-repeats=6
"
